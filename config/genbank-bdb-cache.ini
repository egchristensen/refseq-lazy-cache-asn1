; Sources: src/app/agp_validate/agp_validate.ini and
; src/objtools/data_loaders/genbank/cache/reader_cache.cpp at toolkit revision
; fe8144adf21fc19db6b9c8c96aa623965419e8bd.
; scripts/run_one_case.sh replaces @CACHE_DIR@ in a generated copy.
[genbank]
loader_method = cache;id2
preopen = false

[genbank/id2]
preopen = false

[genbank/cache/id_cache]
driver = bdb

[genbank/cache/id_cache/bdb]
path = @CACHE_DIR@
name = ids
keep_versions = all
write_sync = no

[genbank/cache/blob_cache]
driver = bdb

[genbank/cache/blob_cache/bdb]
path = @CACHE_DIR@
name = blobs
keep_versions = all
write_sync = no
